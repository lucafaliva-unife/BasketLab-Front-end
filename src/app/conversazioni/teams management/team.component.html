<section>
    <label [for]="'teamName_' + selectedTeam.id_team">Nome:</label>
    <input type="text" id="teamName" [disabled]="!teamModifyState" [(ngModel)]="selectedTeam.nome">
    <br/>
    <label [for]="'teamCity_' + selectedTeam.id_team">Città:</label>
    <input type="text" id="teamCity" [disabled]="!teamModifyState" [(ngModel)]="selectedTeam.citta">
    <br/>
    <button *ngIf="teamModifyState" (click)="editTeam()">Conferma</button>
    <button (click)="deleteTeam()">Elimina Team</button>
    <button (click)="teamModifyState= !teamModifyState">Modifica Team</button>
</section>
<section>
    <h1>Team Analytics</h1>

</section>
<section>
    <article *ngFor="let player of players">
        <label [for]="'nomePlayer_' + player.id_player">Nome:</label>
        <input type="text" [id]="'nomePlayer_' + player.id_player" [disabled]="!playerModifyState[player.id_player]" [(ngModel)]="player.nome">
        <br/>
        <label [for]="'cognomePlayer_' + player.id_player">Cognome:</label>
        <input type="text" [id]="'cognomePlayer_' + player.id_player" [disabled]="!playerModifyState[player.id_player]" [(ngModel)]="player.cognome">
        <br/>
        <label [for]="'dataNascitaPlayer_' + player.id_player">Data Nascita:</label>
        <input type="date" [id]="'dataNascitaPlayer_' + player.id_player" [disabled]="!playerModifyState[player.id_player]" [(ngModel)]="player.data_nascita">
        <br/>
        <label [for]="'ruoloPlayer_' + player.id_player">Ruolo:</label>
        <select [id]="'ruoloPlayer_' + player.id_player" [disabled]="!playerModifyState[player.id_player]" [(ngModel)]="player.ruolo">
            <option value="ruolo_1">Ruolo 1</option>
            <option value="ruolo_2">Ruolo 2</option>
            <option value="ruolo_3">Ruolo 3</option>
        </select>
        <br/>
        <label [for]="'pesoPlayer_' + player.id_player">Peso:</label>
        <input type="number" [id]="'pesoPlayer_' + player.id_player" [disabled]="!playerModifyState[player.id_player]" [(ngModel)]="player.peso">
        <br/>
        <label [for]="'altezzaPlayer_' + player.id_player">Altezza:</label>
        <input type="number" step="0.1" [id]="'altezzaPlayer_' + player.id_player" [disabled]="!playerModifyState[player.id_player]" [(ngModel)]="player.altezza">
        <br/>
        <button *ngIf="modifyState[player.id_player]" (click)="editTeam(player)">Conferma</button>
        <button (click)="deletePlayer(player.id_player)">Elimina Player</button>
        <button (click)="setModifyState(player.id_player)">Modifica Player</button>
        <a [routerLink]="['/players', player.id_player]">
            <button>Dettaglio Player</button>
        </a>
    </article>
</section>
<button (click)="showForm= true">Aggiungi Player</button>
<form #form="ngForm" *ngIf="showForm" (ngSubmit)="createPlayer(newPlayer)">
    <label for="nomePlayer">Nome:</label>
    <input name="nomePlayer" type="text" id="nomePlayer" [(ngModel)]="newPlayer.nome">
    <br/>
    <label for="cognomePlayer">Cognome:</label>
    <input name="cognomePlayer" type="text" id="cognomePlayer" [(ngModel)]="newPlayer.cognome">
    <br/>
    <label for="dataNascitaPlayer">Data Nascita:</label>
    <input name="dataNascitaPlayer" type="date" id="'ataNascitaPlayer" [(ngModel)]="newPlayer.data_nascita">
    <br/>
    <label for="ruoloPlayer">Ruolo:</label>
    <select name="ruoloPlayer" id="ruoloPlayer" [(ngModel)]="newPlayer.ruolo">
        <option value="ruolo_1">Ruolo 1</option>
        <option value="ruolo_2">Ruolo 2</option>
        <option value="ruolo_3">Ruolo 3</option>
    </select>
    <br/>
    <label for="pesoPlayer">Peso:</label>
    <input name="pesoPlayer" type="number" id="pesoPlayer" [(ngModel)]="newPlayer.peso">
    <br/>
    <label for="altezzaPlayer">Altezza:</label>
    <input name="altezzaPlayer" type="number" step="0.1" id="altezzaPlayer" [(ngModel)]="newPlayer.altezza">
    <br/>
    <button type="submit" [disabled]="form.invalid">Conferma</button>
</form>
<button (click)="showForm= false" *ngIf="showForm">Annulla</button>
<br/>
<a routerLink="/teams">
    <button>Torna ai Team</button>
</a>
